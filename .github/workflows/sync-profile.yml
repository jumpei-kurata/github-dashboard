name: Sync Profile README

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - '.github/workflows/update-podcast.yml'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout github-dashboard
        uses: actions/checkout@v4

      - name: Clone profile repository
        run: |
          git clone https://x-access-token:${{ secrets.PROFILE_REPO_TOKEN }}@github.com/jumpei-kurata/jumpei-kurata.git /tmp/profile-repo

      - name: Copy README to profile repo
        run: |
          cp README.md /tmp/profile-repo/README.md

      - name: Fetch and inject latest episode + view count
        run: |
          python3 << 'EOF'
          import urllib.request, json, xml.etree.ElementTree as ET, re

          # --- Podcast ---
          with urllib.request.urlopen("https://itunes.apple.com/lookup?id=1601084785&entity=podcast") as r:
              data = json.loads(r.read())
          feed_url = data["results"][0]["feedUrl"]

          with urllib.request.urlopen(feed_url) as r:
              tree = ET.parse(r)

          item = tree.getroot().find("channel/item")
          title = item.findtext("title") or "Latest Episode"

          link = item.findtext("link")
          if not link:
              guid = item.find("guid")
              if guid is not None and guid.get("isPermaLink") != "false":
                  link = guid.text
          if not link:
              link = "https://podcasts.apple.com/us/podcast/id1601084785"

          # --- Profile view count ---
          req = urllib.request.Request(
              "https://komarev.com/ghpvc/?username=jumpei-kurata&style=flat",
              headers={"User-Agent": "Mozilla/5.0"}
          )
          with urllib.request.urlopen(req) as r:
              svg = r.read().decode()
          nums = re.findall(r'>(\d+)<', svg)
          count = nums[-1] if nums else "0"

          with open("/tmp/profile-repo/README.md", "r", encoding="utf-8") as f:
              content = f.read()

          content = re.sub(
              r"<!-- PODCAST_EPISODE_START -->.*?<!-- PODCAST_EPISODE_END -->",
              f"<!-- PODCAST_EPISODE_START -->\n🎧 **[{title}]({link})**\n<!-- PODCAST_EPISODE_END -->",
              content, flags=re.DOTALL,
          )

          content = re.sub(
              r"<!-- PODCAST_IMAGE_START -->.*?<!-- PODCAST_IMAGE_END -->",
              f'<!-- PODCAST_IMAGE_START -->\n<a href="{link}"><img src="https://is1-ssl.mzstatic.com/image/thumb/Podcasts116/v4/ad/8e/fd/ad8efde9-ff28-54d8-e19c-5d59e7c9291a/mza_4474957022231398879.jpeg/600x600bb.jpg" width="120" alt="ひまじんプログラマー" /></a>\n<!-- PODCAST_IMAGE_END -->',
              content, flags=re.DOTALL,
          )

          content = re.sub(
              r"<!-- VIEWS_BADGE_START -->.*?<!-- VIEWS_BADGE_END -->",
              f'<!-- VIEWS_BADGE_START -->\n✨ [![GitHub Profile Views](https://img.shields.io/badge/GitHub_Profile_Views-{count}-ec4899?style=for-the-badge&labelColor=9d174d&logo=github&logoColor=white)](https://github.com/jumpei-kurata) ✨\n<!-- VIEWS_BADGE_END -->',
              content, flags=re.DOTALL,
          )

          with open("/tmp/profile-repo/README.md", "w", encoding="utf-8") as f:
              f.write(content)

          print(f"Podcast: {title} -> {link}")
          print(f"Views: {count}")
          EOF

      - name: Commit and push
        run: |
          cd /tmp/profile-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git diff --quiet && echo "No changes" || (
            git add README.md &&
            git commit -m "chore: sync profile from github-dashboard" &&
            git push
          )
